<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontier Flight Tracker</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>✈️ Frontier Flight Tracker</h1>
            <p class="subtitle">SFO/SJC ↔ LAS 单程航班价格查询</p>
        </header>

        <!-- 登录前界面 -->
        <div id="login-section" class="section">
            <div class="card">
                <h2>登录</h2>
                <p class="info-text">请输入访问密码</p>

                <form id="login-form">
                    <div class="form-group">
                        <input
                            type="password"
                            id="password-input"
                            placeholder="输入密码"
                            autocomplete="current-password"
                        >
                    </div>

                    <button type="submit" id="login-btn" class="btn btn-primary">
                        登录
                    </button>
                </form>

                <div id="message" class="message"></div>
            </div>
        </div>

        <!-- 登录后界面 -->
        <div id="dashboard-section" class="section" style="display: none;">
            <div class="card">
                <h2>查询航班</h2>
                <p class="info-text">输入邮箱，点击按钮查询接下来 14 天的航班价格</p>

                <div class="route-info">
                    <div class="route-item">📍 SFO → LAS</div>
                    <div class="route-item">📍 SJC → LAS</div>
                    <div class="route-item">📍 LAS → SFO</div>
                    <div class="route-item">📍 LAS → SJC</div>
                </div>

                <form id="query-form">
                    <div class="form-group">
                        <input
                            type="email"
                            id="email-input"
                            placeholder="接收报告的邮箱地址"
                            required
                            value="beizhangbill@gmail.com"
                        >
                    </div>

                    <button type="submit" id="query-btn" class="btn btn-large btn-success">
                        🚀 查询航班
                    </button>
                </form>

                <button id="logout-btn" class="btn btn-secondary">
                    登出
                </button>

                <div id="query-message" class="message"></div>
            </div>

            <div class="card schedule-info">
                <h3>📅 定时报告</h3>
                <p>每周二、周四 8:00 AM 自动发送报告</p>
            </div>
        </div>

        <!-- 加载动画 -->
        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p id="loading-text">正在查询...</p>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
