# Cloud Build 配置 - 用于构建和部署到 Cloud Run

steps:
  # 构建 Docker 镜像
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-west1-docker.pkg.dev/$PROJECT_ID/frontiertracker/flight-tracker:latest', '.']

  # 推送到 Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-west1-docker.pkg.dev/$PROJECT_ID/frontiertracker/flight-tracker:latest']

  # 部署到 Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'frontiertracker'
      - '--image=us-west1-docker.pkg.dev/$PROJECT_ID/frontiertracker/flight-tracker:latest'
      - '--region=us-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--timeout=900'
      - '--set-env-vars=AMADEUS_CLIENT_ID=$$AMADEUS_CLIENT_ID'
      - '--set-env-vars=AMADEUS_CLIENT_SECRET=$$AMADEUS_CLIENT_SECRET'
      - '--set-env-vars=GMAIL_USER=$$GMAIL_USER'
      - '--set-env-vars=GMAIL_APP_PASSWORD=$$GMAIL_APP_PASSWORD'
      - '--set-env-vars=SECRET_KEY=$$SECRET_KEY'
    secretEnv:
      - AMADEUS_CLIENT_ID
      - AMADEUS_CLIENT_SECRET
      - GMAIL_USER
      - GMAIL_APP_PASSWORD
      - SECRET_KEY

# 可用的 secret 需要在 Secret Manager 中配置
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/AMADEUS_CLIENT_ID/versions/latest
      env: AMADEUS_CLIENT_ID
    - versionName: projects/$PROJECT_ID/secrets/AMADEUS_CLIENT_SECRET/versions/latest
      env: AMADEUS_CLIENT_SECRET
    - versionName: projects/$PROJECT_ID/secrets/GMAIL_USER/versions/latest
      env: GMAIL_USER
    - versionName: projects/$PROJECT_ID/secrets/GMAIL_APP_PASSWORD/versions/latest
      env: GMAIL_APP_PASSWORD
    - versionName: projects/$PROJECT_ID/secrets/SECRET_KEY/versions/latest
      env: SECRET_KEY
